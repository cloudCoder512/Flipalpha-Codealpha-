<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - FlipAlpha</title>
    <link rel="stylesheet" href="../assets/css/style-prefix.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="../assets/css/profile.css">
     <link rel="shortcut icon" href="../assets/images/logo/favicon.png" type="image/x-icon">
    <script src="../assets/js/profile.js" defer></script>
</head>
<body>
<div class="profile-container">
    <div class="profile-header">
        <h1>My Account</h1>
        <p>Manage your profile, orders and preferences</p>
    </div>
    <div class="profile-grid">
        <!-- Sidebar -->
        <div class="profile-sidebar">
            <div class="avatar">
                <span id="avatarLetter">U</span>
            </div>
            <div class="user-name" id="displayName">Guest User</div>
            <div class="user-email" id="displayEmail">Not logged in</div>
            <div class="member-since" id="memberSince">Member since: Not registered</div>
            <div class="sidebar-menu">
                <a href="profile.html">Dashboard</a>
                <a href="../public/my-orders.html">My Orders</a>
                <a href="../services/wishlist.html">Wishlist</a>
                <a href="../index.html">Back to Home</a>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </div>
        <!-- Main Content -->
        <div class="profile-main">
            <div class="info-form">
                <h3 class="section-title">Personal Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="emailAddress" placeholder="Enter your email">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="Enter phone number">
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="Enter your address">
                </div>
                <button class="btn-save" onclick="saveProfile()">Save Changes</button>
            </div>
            <div>
                <h3 class="section-title">Order Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalOrders">0</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalSpent">$0</div>
                        <div class="stat-label">Total Spent</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="wishlistCount">0</div>
                        <div class="stat-label">Wishlist Items</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
